<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js example</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            background-color: #ffffff;
        }
    </style>
    <script src="../p5.min.js"></script>
    <script src="cell.js"></script>
    <script src="rocket.js"></script>
</head>

<body>
    <div id="menu">
        <h1>vítejte v Smart rockets - Maze</h1>
        <h2>menu</h2>
        <span>vyberte počet raketek:</span>
        <input id="rocketCount" type="number">
        <br>
        <span>vybete šanci na mutaci</span>
        <input id="mutaceChance" type="number" step="0.001" min="0" max="1">
        <br>
        <span>vyberte velikost bludiště</span>
        <input id="mazeWidth" type="number" placeholder="šířka">
        <input id="mazeHeight" type="number" placeholder="výška">
        <br>
        <button id="startButton">start</button>
        <button id="baseValuesButton">base values</button>
    </div>

    <div id="canvasContainer">

    </div>
    <script src="sketch.js"></script>
</body>

</html>
